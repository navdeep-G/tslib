name: Build Docker image

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew :tslib-api:bootJar

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: navdeep-g/tslib-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: tslib-api
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save Docker image as tarball
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker save "$IMAGE" | gzip > tslib-api.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tslib-api-docker-${{ github.sha }}
          path: tslib-api.tar.gz
          retention-days: 14

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tslib-api.tar.gz
